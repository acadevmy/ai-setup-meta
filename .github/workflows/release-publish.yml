name: Release - Publish

# Triggerata quando una "release PR" (branch release/<template>-v<version>)
# viene mergeata su main. Crea il tag annotato e la GitHub Release.
#
# Nota: questo workflow NON ricostruisce dist/ — quello e' gia' stato fatto da
# release-prepare.yml ed e' parte del merge commit.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    # Solo se la PR e' stata mergeata (non chiusa senza merge) e parte da
    # un branch "release/<template>-v<version>"
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Checkout del merge commit per pinnare tag a quel SHA
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Parse template + version from branch name
        id: parse
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          # Branch name: "release/<template>-v<X>.<Y>.<Z>"
          STRIPPED="${BRANCH#release/}"
          if [[ ! "$STRIPPED" =~ ^([a-z0-9-]+)-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::error::Branch name '$BRANCH' non rispetta il pattern release/<template>-v<X>.<Y>.<Z>"
            exit 1
          fi
          TEMPLATE="${BASH_REMATCH[1]}"
          VERSION="${BASH_REMATCH[2]}"
          echo "template=$TEMPLATE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Estratti: template=$TEMPLATE, version=$VERSION"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/release/publish-release.sh \
            "${{ steps.parse.outputs.template }}" \
            "${{ steps.parse.outputs.version }}"
